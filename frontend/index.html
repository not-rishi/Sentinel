<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SENTINEL | Triage Control</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
  </head>
  <body>
    <div
      id="vanta-bg"
      style="
        position: fixed;
        z-index: -1;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      "
    ></div>

    <header class="main-header">
      <img src="assets/logo.png" height="60px" alt="Logo" />
      <h1>SENTINEL Triage Control</h1>
      <div
        style="display: flex; gap: 20px; align-items: center; margin-left: auto"
      >
        <span
          id="welcome-message"
          style="color: var(--muted); font-size: 0.9rem"
        ></span>
        <button
          onclick="handleLogout()"
          class="view-btn"
          style="border-color: var(--danger); color: var(--danger)"
        >
          LOGOUT
        </button>
        <div id="connection-status">GATEWAY CONNECTED</div>
      </div>
    </header>

    <div class="dashboard-layout">
      <section class="stats-bar">
        <div class="stat-card">
          <label>TOTAL VOLUME</label>
          <span id="stat-total">0</span>
        </div>

        <div class="stat-card critical">
          <label>CRITICAL ALERTS</label>
          <span id="stat-critical">0</span>
        </div>

        <div class="stat-card monitor-card">
          <div class="monitor-header">
            <label>UPTIME</label>
            <div>
              <span
                id="stat-uptime-time"
                style="font-size: 0.85rem; color: #94a3b8; margin-right: 8px"
                >00:00:00</span
              >
              <span id="stat-uptime">100.00%</span>
            </div>
          </div>
          <div class="progress-track">
            <div
              id="bar-uptime"
              class="progress-fill status-green"
              style="width: 100%"
            ></div>
          </div>
        </div>

        <div class="stat-card monitor-card">
          <div class="monitor-header">
            <label>DELIVERABILITY</label>
            <span id="stat-delivery">100.00%</span>
          </div>
          <div class="progress-track">
            <div
              id="bar-delivery"
              class="progress-fill status-green"
              style="width: 100%"
            ></div>
          </div>
        </div>
      </section>

      <section class="queue-container">
        <table>
          <thead>
            <tr>
              <th>TIME</th>
              <th>PATIENT ID</th>
              <th>STUDY UID</th>
              <th>PRIORITY</th>
              <th>AI FLAGS</th>
              <th>ACTION</th>
            </tr>
          </thead>
          <tbody id="queue-body">
          </tbody>
        </table>
      </section>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.cells.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        VANTA.CELLS({
          el: "#vanta-bg", 
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.0,
          minWidth: 200.0,
          scale: 2,
          color1: 0x6a1b9a,
          color2: 0xc158dc,
        });
      });
    </script>
    <script src="app.js"></script>
  </body>
</html>
